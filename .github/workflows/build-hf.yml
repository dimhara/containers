name: Build containers

on:
  push:
    branches: [main]
    paths:
      - 'local/**'
      - 'nvidia/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  HF_IMAGE: ${{ github.repository }}/hf-base
  VV_IMAGE: ${{ github.repository }}/vibevoice
  VAD_IMAGE: ${{ github.repository }}/vad

jobs:
  hf-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push hf-base
        uses: docker/build-push-action@v6
        with:
          context: ./local
          file: local/Containerfile.hf
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.HF_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.HF_IMAGE }}:cpu

  vibevoice:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push vibevoice
        uses: docker/build-push-action@v6
        with:
          context: ./nvidia
          file: nvidia/Containerfile.vibevoice
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.VV_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.VV_IMAGE }}:cuda13

  vad:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push vad
        uses: docker/build-push-action@v6
        with:
          context: ./local
          file: local/Containerfile.vad
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.VAD_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.VAD_IMAGE }}:cpu