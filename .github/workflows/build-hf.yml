name: Build hf-base & vibevoice

on:
  push:
    branches: [main]
    paths:
      - 'Containerfile.hf'
      - 'Containerfile.vibevoice'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  HF_IMAGE: ${{ github.repository }}/hf-base
  VV_IMAGE: ${{ github.repository }}/vibevoice

jobs:
  hf-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push hf-base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile.hf
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.HF_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.HF_IMAGE }}:cuda12.4

  vibevoice:
    needs: hf-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push vibevoice
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile.vibevoice
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.VV_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.VV_IMAGE }}:cuda12.4