name: Test vibevoice_runpod (CPU)

on:
  push:
    branches: [main]
    paths:
      - 'nvidia/vibevoice_runpod/**'
  pull_request:
    paths:
      - 'nvidia/vibevoice_runpod/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        working-directory: nvidia/vibevoice_runpod/tests
        run: |
          pip install -r requirements-test.txt

      - name: Run tests
        working-directory: nvidia/vibevoice_runpod
        run: |
          python -m pytest tests/ -v --tb=short